<!doctype html>
<html><head><meta charset="utf-8">
<title>Santam Broker Insights</title>
<script src="./tableau.extensions.1.latest.js"></script>
<style>
 body{font-family:Arial,Helvetica,sans-serif;color:#1b2a41;margin:0;padding:14px 18px;background:#fff;font-size:12px}
 .hdr{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid #1b2a41;padding-bottom:6px;margin-bottom:12px}
 .hdr h1{font-size:14px;margin:0;letter-spacing:.4px;color:#4a5568;font-weight:700}
 .hdr .per{font-size:11px;color:#7b8794}
 .kpis{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
 .kpi{flex:1;min-width:110px;border-top:3px solid #ffc72c;background:#f7f9fc;padding:7px 9px}
 .kpi .v{font-size:16px;font-weight:700}.kpi .l{font-size:8.5px;letter-spacing:.5px;color:#7b8794;text-transform:uppercase}
 .sec{display:flex;align-items:center;gap:8px;margin:14px 0 5px}
 .sec .ltr{color:#ffc72c;font-weight:700;font-size:13px}
 .sec h2{font-size:12.5px;margin:0;font-weight:600;letter-spacing:.3px}
 .sec .badge{margin-left:auto;background:#ffc72c;color:#1b2a41;font-size:8px;font-weight:700;padding:3px 10px;border-radius:3px;letter-spacing:.7px}
 .panel{background:#f7f9fc;padding:10px 12px;margin-bottom:5px}
 .blk{margin-bottom:9px}.blk .t{font-size:9.5px;font-weight:700;margin-bottom:2px;letter-spacing:.2px}
 .blk p{margin:2px 0;line-height:1.45;color:#33415c}
 .err{color:#b00020}.muted{color:#8a94a6}
 .foot{margin-top:12px;border-top:1px solid #d8dee9;padding-top:6px;font-size:8.5px;color:#8a94a6}
</style></head>
<body><div id="app">Loading…</div>
<div class="foot" id="buildstamp">BUILD v5 &middot; Santam Broker Insights</div>
<script>
/* ---------- formatting (SA convention) ---------- */
function sa(x,dp){dp=dp==null?1:dp;if(x==null||isNaN(x))return"0";
  return x.toFixed(dp).replace(/\B(?=(\d{3})+(?!\d))/g," ").replace(".",",");}
function rands(v,dp){if(v==null||isNaN(v))return"R0";var a=Math.abs(v);
  if(a>=1e6)return"R"+sa(v/1e6,dp==null?1:dp)+"M";
  if(a>=1e3)return"R"+sa(v/1e3,0)+"k";return"R"+sa(v,0);}
function pc(n,d,dp){return d?sa(100*n/d,dp==null?1:dp)+"%":"n/a";}

/* ---------- worksheet reading (handles wide AND Measure Names/Values layouts) ---------- */
function num(x){if(x==null)return 0;var v=(x.value!=null&&x.value!=="%null%")?x.value:x.formattedValue;
  if(typeof v==="number")return isNaN(v)?0:v;
  v=String(v).replace(/[^\d,.\-]/g,"").replace(/\s/g,"");
  if(v.indexOf(",")>-1&&v.indexOf(".")>-1)v=v.replace(/,/g,""); else v=v.replace(",",".");
  var n=parseFloat(v);return isNaN(n)?0:n;}
function txt(x){if(x==null)return "";var v=x.formattedValue!=null?x.formattedValue:x.value;return String(v==null?"":v);}
function isNull(t){t=(t||"").trim().toLowerCase();return t===""||t==="null"||t==="%null%";}
function idxOf(cols,needle){for(var i=0;i<cols.length;i++){if(cols[i].fieldName.toLowerCase().indexOf(needle)>-1)return i;}return -1;}

/* -> [{label, vals:{measureName:number}}] regardless of sheet layout */
function parse(sheet){
  if(!sheet)return [];
  var cols=sheet.cols,rows=sheet.rows;
  var mn=idxOf(cols,"measure names"),mv=idxOf(cols,"measure values");
  var out=[];
  if(mn>-1&&mv>-1){                                  // long format
    var dim=-1;for(var i=0;i<cols.length;i++){if(i!==mn&&i!==mv){dim=i;break;}}
    var map={},order=[];
    rows.forEach(function(r){
      var lbl=dim>-1?txt(r[dim]):"";
      if(!map[lbl]){map[lbl]={label:lbl,vals:{}};order.push(lbl);}
      map[lbl].vals[txt(r[mn]).toLowerCase()]=num(r[mv]);});
    out=order.map(function(k){return map[k];});
  }else{                                             // wide format
    out=rows.map(function(r){
      var o={label:txt(r[0]),vals:{}};
      for(var i=1;i<cols.length;i++)o.vals[cols[i].fieldName.toLowerCase()]=num(r[i]);
      return o;});
  }
  return out.filter(function(r){return !isNull(r.label);});
}
function pick(vals){var needles=[].slice.call(arguments,1);
  for(var k in vals){if(needles.every(function(n){return k.indexOf(n)>-1;}))return vals[k];}return 0;}
function readSheet(dash,name){
  var ws=dash.worksheets.filter(function(w){return w.name.toLowerCase()===name.toLowerCase();})[0];
  if(!ws)return Promise.resolve(null);
  return ws.getSummaryDataAsync({maxRows:10000,ignoreSelection:true}).then(function(dt){
    return {cols:dt.columns,rows:dt.data};});}

/* ---------- fallback: raw DW code -> business unit name ---------- */
var BU_MAP={"ert_africa":"Corporate Property","ert":"Corporate Property","sha":"CAHM",
 "amua":"Marine","mirabilis":"Construction & Engineering","vum":"Emerging Business",
 "cbg":"Guarantees","csure":"Specialist Real Estate","aviation":"Aviation"};
function buName(n){var k=(n||"").trim().toLowerCase();return BU_MAP[k]||n;}

/* ---------- multi-dimension reader for the movement sheets ---------- */
function records(sheet){
  if(!sheet)return [];
  var cols=sheet.cols,rows=sheet.rows;
  var mn=idxOf(cols,"measure names"),mv=idxOf(cols,"measure values");
  if(mn>-1&&mv>-1){
    var dimIdx=[];for(var i=0;i<cols.length;i++)if(i!==mn&&i!==mv)dimIdx.push(i);
    var map={},order=[];
    rows.forEach(function(r){
      var key=dimIdx.map(function(i){return txt(r[i]);}).join("||");
      if(!map[key]){var d={};dimIdx.forEach(function(i){d[cols[i].fieldName.toLowerCase()]=txt(r[i]);});map[key]={dim:d,vals:{}};order.push(key);}
      map[key].vals[txt(r[mn]).toLowerCase()]=num(r[mv]);});
    return order.map(function(k){return map[k];});
  }
  return rows.map(function(r){var d={},vals={};
    cols.forEach(function(c,i){var f=c.fieldName.toLowerCase();
      if(/gwp|incur|claim|count|distinct/.test(f))vals[f]=num(r[i]);else d[f]=txt(r[i]);});
    return {dim:d,vals:vals};});
}
function agg(recs){var n=0,g=0;recs.forEach(function(r){n+=pick(r.vals,"policy")||0;g+=pick(r.vals,"gwp")||0;});
  if(n===0)n=recs.length;return {n:n,g:g,recs:recs.length};}
function groupBy(recs,dimKey){var m={};recs.forEach(function(r){var k=r.dim[dimKey]||"(none)";
  if(!m[k])m[k]={name:k,n:0,g:0};m[k].n+=pick(r.vals,"policy")||1;m[k].g+=pick(r.vals,"gwp")||0;});
  return Object.keys(m).map(function(k){return m[k];}).sort(function(a,b){return b.n-a.n;});}
function groupByYear(recs,dimKey){var m={};recs.forEach(function(r){
  var y=((r.dim[dimKey]||"").match(/(19|20)\d\d/)||["?"])[0];
  if(!m[y])m[y]={name:y,n:0,g:0};m[y].n+=pick(r.vals,"policy")||1;m[y].g+=pick(r.vals,"gwp")||0;});
  return Object.keys(m).sort().map(function(k){return m[k];});}
function mvBlock(sheet,dimKey,byYear){var recs=records(sheet);var a=agg(recs);
  a.present=!!sheet;a.by=byYear?groupByYear(recs,dimKey):groupBy(recs,dimKey);return a;}

/* ---------- narrative rules (ported from brokerlens_insights.py) ---------- */
var FLAT=3,DOMINANT=30,SPREAD=40,BIGCLAIM=25,FEW=60,SMALLBASE=2,MATURITY=25;
function trend(series,noun,fmt){
  var pts=series.filter(function(p){return p.label;});
  if(pts.length<2)return "Only one period available - no trend yet.";
  var ytd=pts[pts.length-1].label.toUpperCase().indexOf("YTD")>-1, judge=ytd&&pts.length>2?pts.slice(0,-1):pts;
  var v=judge.map(function(p){return p.value;}),l=judge.map(function(p){return p.label;});
  var d=[];for(var i=0;i<v.length-1;i++)d.push(v[i]?100*(v[i+1]-v[i])/v[i]:0);
  var s=d.map(function(x){return Math.abs(x)<FLAT?0:(x>0?1:-1);});
  var overall=v[0]?100*(v[v.length-1]-v[0])/v[0]:0;
  var peak=v.indexOf(Math.max.apply(null,v)),trough=v.indexOf(Math.min.apply(null,v));
  var mag=(overall>=0?"+":"")+sa(overall,0)+"% overall ("+l[0]+" to "+l[l.length-1]+")",shape;
  if(s.every(function(x){return x===0;}))shape=noun+" held broadly flat - "+mag+".";
  else if(s.every(function(x){return x>=0;}))shape=noun+" grew in every period - "+mag+".";
  else if(s.every(function(x){return x<=0;}))shape=noun+" declined in every period - "+mag+".";
  else if(s[s.length-1]<0&&s.slice(0,-1).every(function(x){return x>=0;}))
    shape=noun+" rose to a peak in "+l[peak]+" ("+fmt(v[peak])+") then fell back - "+mag+".";
  else if(s[0]<0&&s.slice(1).every(function(x){return x>=0;}))
    shape=noun+" dipped to a low in "+l[trough]+" and recovered since - "+mag+".";
  else if(peak>0&&peak<v.length-1)shape=noun+" peaked in "+l[peak]+" and has eased since - "+mag+".";
  else if(trough>0&&trough<v.length-1)shape=noun+" bottomed in "+l[trough]+" before turning up - "+mag+".";
  else shape=noun+" moved unevenly period to period - "+mag+".";
  var detail=pts.map(function(p){return p.label+": "+fmt(p.value);}).join("; ");
  var note=ytd&&pts.length>2?" "+pts[pts.length-1].label+" is part-year and not comparable to the completed years.":"";
  return shape+" By period - "+detail+"."+note;}
function concentration(top,total){
  if(!top.length||!total)return "";
  var s1=100*top[0].gwp/total,t10=top.slice(0,10).reduce(function(a,r){return a+r.gwp;},0),s10=100*t10/total;
  if(s1>=DOMINANT)return "The book is dominated by a single account - "+top[0].name+" is "+sa(s1,0)+"% of GWP ("+rands(top[0].gwp)+"); the top 10 are "+sa(s10,0)+"%. Retaining that one relationship matters disproportionately.";
  if(s10<=SPREAD)return "Premium is well spread - no single account dominates ("+top[0].name+", the largest, is only "+sa(s1,0)+"%) and the top 10 are "+sa(s10,0)+"% of GWP.";
  return "Premium is moderately concentrated - "+top[0].name+" is the largest at "+sa(s1,0)+"% and the top 10 account for "+sa(s10,0)+"% of GWP.";}
function lossDriver(top,totalInc){
  if(!top.length||!totalInc)return "No material claims incurred in the period.";
  var byInc=top.slice().sort(function(a,b){return b.inc-a.inc;});
  var b1=100*byInc[0].inc/totalInc,t5=byInc.slice(0,5).reduce(function(a,r){return a+r.inc;},0),s5=100*t5/totalInc;
  if(b1>=BIGCLAIM)return "Loss is concentrated in one account, not broad attrition - "+byInc[0].name+" at "+rands(byInc[0].inc)+" is "+sa(b1,0)+"% of all incurred; the top 5 are "+sa(s5,0)+"%.";
  if(s5>=FEW)return "Losses sit in a handful of accounts rather than broad attrition - the top 5 are "+sa(s5,0)+"% of incurred, led by "+byInc[0].name+" ("+rands(byInc[0].inc)+").";
  return "Losses look broad and attritional rather than event-driven - the largest single account is only "+sa(b1,0)+"% of incurred and the top 5 are "+sa(s5,0)+"%.";}
function maturity(open,total){if(!total)return "";var s=100*open/total;
  if(s<MATURITY)return "";
  return "Claims are still developing - "+sa(s,0)+"% ("+sa(open,0)+" of "+sa(total,0)+") remain open, so recent periods are reserve-based and provisional.";}
function buPhrases(bus,totalGwp){
  return bus.filter(function(r){return r.gwp>0;}).sort(function(a,b){return b.inc/b.gwp-a.inc/a.gwp;}).slice(0,6)
   .map(function(r){var lr=100*r.inc/r.gwp,sh=totalGwp?100*r.gwp/totalGwp:0;
     if(sh<SMALLBASE&&lr>50)return r.name+" shows "+sa(lr)+"% but on a very small base ("+rands(r.gwp)+", "+sa(sh)+"% of GWP) - distorted, not a real concern.";
     if(lr>100)return r.name+" is loss-making at "+sa(lr)+"% on "+rands(r.gwp)+".";
     return r.name+" "+sa(lr)+"% on "+rands(r.gwp)+".";});}

/* ---------- render ---------- */
function esc(s){return String(s).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});}
function section(l,t,blocks){var h='<div class="sec"><span class="ltr">'+l+'</span><h2>'+t+'</h2><span class="badge">INSIGHTS</span></div><div class="panel">';
  blocks.forEach(function(b){h+='<div class="blk"><div class="t">'+esc(b[0])+'</div>';
    b[1].filter(function(x){return x&&x.trim();}).forEach(function(x){h+="<p>"+esc(x)+"</p>";});h+="</div>";});
  return h+"</div>";}

function buildC(mv){
  var c=mv.cancel,l=mv.lapse,mo=mv.moved,nw=mv.incept;
  if(!(c.present||l.present||mo.present||nw.present))return "";
  var blocks=[];
  if(c.present)blocks.push(["CANCELLATIONS",[
    c.n+" policies cancelled in the period, carrying "+rands(c.g)+" of premium (premium earned over the window, not a clean forward loss).",
    c.by.length?"By business unit: "+c.by.slice(0,6).map(function(r){return buName(r.name)+" "+r.n;}).join(", ")+".":""]]);
  if(l.present)blocks.push(["LAPSES (NON-RENEWALS)",[
    l.n+" policies lapsed (not renewed), "+rands(l.g)+" of premium.",
    l.by.length?"By business unit: "+l.by.slice(0,6).map(function(r){return buName(r.name)+" "+r.n;}).join(", ")+".":""]]);
  if(mo.present)blocks.push(["MOVED TO ANOTHER BROKER",[
    mo.n+" policies now sit with another broker. Premium shown is what they raised with this broker ("+rands(mo.g)+"), not the new broker's.",
    mo.by.length?"Where it went: "+mo.by.slice(0,5).map(function(r){return r.name+" ("+r.n+", "+rands(r.g)+")";}).join(", ")+".":"",
    "A moved policy may also have cancelled or lapsed, so this overlaps with the figures above and is not additive."]]);
  if(nw.present){
    var lostN=(c.present?c.n:0)+(l.present?l.n:0);
    var lostG=(c.present?c.g:0)+(l.present?l.g:0);
    var dir=nw.n>=lostN?"the book is adding more policies than it is losing":"the book is losing more policies than it is adding";
    blocks.push(["NEW BUSINESS (INCEPTED IN PERIOD)",[
      nw.n+" policies incepted, "+rands(nw.g)+" of new premium.",
      nw.by.length?"By inception year: "+nw.by.map(function(r){return r.name+": "+r.n+" / "+rands(r.g);}).join(", ")+".":"",
      "Net on policy count: "+nw.n+" new against "+lostN+" cancelled or lapsed - "+dir+".",
      "New premium "+rands(nw.g)+" vs "+rands(lostG)+" on cancelled/lapsed policies - indicative only, since cancelled premium reflects what was earned over the window rather than a forward loss."]]);
  }
  return section("C","POLICY MOVEMENT INSIGHTS",blocks);
}
function build(byYear,byBU,accounts,claims,mv,diag){
  var gwp=byYear.reduce(function(a,r){return a+r.gwp;},0),inc=byYear.reduce(function(a,r){return a+r.inc;},0);
  var pol=byYear.reduce(function(a,r){return a+r.pol;},0),lr=gwp?100*inc/gwp:0;
  var openC=claims.filter(function(c){return !/FINAL|CLOSED|SETTLED|WITHDRAWN|REPUDIAT/i.test(c.name);})
                  .reduce(function(a,c){return a+c.n;},0);
  var allC=claims.reduce(function(a,c){return a+c.n;},0);
  var kpi=[["GROSS WRITTEN PREMIUM",rands(gwp)],["LOSS RATIO",sa(lr)+"%"],[(mv&&mv.total&&mv.total.present)?"POLICIES":"POLICY YEARS",sa((mv&&mv.total&&mv.total.present)?mv.total.n:pol,0)],
           ["ACCOUNTS",sa(accounts.length,0)],["GROSS INCURRED",rands(inc)]];
  var h='<div class="hdr"><h1>BROKER PORTFOLIO &mdash; INSIGHTS</h1><div class="per">'+
        esc(byYear.length?(byYear[0].label+' - '+byYear[byYear.length-1].label):'')+'</div></div><div class="kpis">';
  kpi.forEach(function(k){h+='<div class="kpi"><div class="v">'+k[1]+'</div><div class="l">'+k[0]+'</div></div>';});
  h+="</div>";
  h+=section("A","GROSS WRITTEN PREMIUM INSIGHTS",[
    ["HOW IS GWP TRENDING?",[trend(byYear.map(function(r){return {label:r.label,value:r.gwp};}),"GWP",function(v){return rands(v);}),
      "Total "+rands(gwp)+" across "+sa(pol,0)+" policy-years (a policy running over several years counts once per year)."]],
    ["CONCENTRATION",[concentration(accounts,gwp),
      "By business unit: "+byBU.slice().sort(function(a,b){return b.gwp-a.gwp;}).slice(0,5)
        .map(function(r){return r.name+" "+rands(r.gwp)+" ("+pc(r.gwp,gwp,0)+")";}).join(", ")+"."]]]);
  h+=section("B","LOSS RATIO INSIGHTS",[
    ["WHAT IS DRIVING LOSS RATIOS?",[
      "Loss ratio "+sa(lr)+"% overall - "+rands(inc)+" incurred on "+rands(gwp)+" GWP.",
      trend(byYear.map(function(r){return {label:r.label,value:r.gwp?100*r.inc/r.gwp:0};}),"The loss ratio",function(v){return sa(v)+"%";}),
      lossDriver(accounts,inc), maturity(openC,allC)]],
    ["LOSS RATIOS BY BUSINESS UNIT",buPhrases(byBU,gwp)]]);
  h+=buildC(mv);
  h+='<div class="foot">BUILD v6 &middot; rows read: ByYear '+(diag?diag.y:'?')+', ByUMA '+(diag?diag.u:'?')+', TopAccounts '+(diag?diag.a:'?')+', Claims '+(diag?diag.c:'?')+'<br>ByYear columns: '+esc(diag?diag.cols:'')+'<br>Generated live from the current dashboard filters. GWP in ZAR. Loss ratio = gross claims incurred / GWP (excludes IBNR, fees, forex). Claim status is a point-in-time snapshot.</div>';
  return h;}

/* ---------- wiring ---------- */
function refresh(){
  var dash=tableau.extensions.dashboardContent.dashboard;
  return Promise.all([readSheet(dash,"INS_ByYear"),readSheet(dash,"INS_ByUMA"),
                      readSheet(dash,"INS_TopAccounts"),readSheet(dash,"INS_Claims"),
                      readSheet(dash,"INS_Total"),readSheet(dash,"CancelledInPeriod"),
                      readSheet(dash,"ExpiredInPeriod"),readSheet(dash,"InceptionInPeriod"),
                      readSheet(dash,"MovedOutPremium")])
  .then(function(r){
    var names=["INS_ByYear","INS_ByUMA","INS_TopAccounts","INS_Claims"];
    var missing=names.filter(function(n,i){return !r[i];});
    if(missing.length){document.getElementById("app").innerHTML=
      '<p class="err">Missing worksheet(s) on this dashboard: '+missing.join(", ")+
      '</p><p class="muted">Add them to the dashboard (they may sit off-canvas) and refresh.</p>';return;}

    var byYear=parse(r[0]).map(function(x){
        return {label:x.label,gwp:pick(x.vals,"gwp"),inc:pick(x.vals,"incur"),pol:pick(x.vals,"policy")};})
      .filter(function(y){return y.gwp!==0||y.inc!==0||y.pol!==0;})   // drops empty / pre-range years
      .sort(function(a,b){return a.label<b.label?-1:1;});
    var byBU=parse(r[1]).map(function(x){
        return {name:buName(x.label),gwp:pick(x.vals,"gwp"),inc:pick(x.vals,"incur")};})
      .filter(function(b){return b.gwp!==0||b.inc!==0;});
    var accounts=parse(r[2]).map(function(x){
        return {name:x.label,gwp:pick(x.vals,"gwp"),inc:pick(x.vals,"incur")};})
      .filter(function(a){return a.gwp!==0||a.inc!==0;}).sort(function(m,n){return n.gwp-m.gwp;});
    var claims=parse(r[3]).map(function(x){
        return {name:x.label,n:pick(x.vals,"claim")||pick(x.vals,"cntd")};})
      .filter(function(c){return c.n!==0;});

    if(!byYear.length){document.getElementById("app").innerHTML=
      '<p class="err">INS_ByYear returned no usable rows.</p><p class="muted">Check the sheet has a year dimension and the GWP / incurred measures, and that the broker filter is applied to it.</p>';return;}
    var total=agg(records(r[4]));total.present=!!r[4];
    var mv={total:total,
            cancel:mvBlock(r[5],"business unit",false),
            lapse:mvBlock(r[6],"business unit",false),
            incept:mvBlock(r[7],"original inception date",true),
            moved:mvBlock(r[8],"latest broker on policy",false)};
    document.getElementById("app").innerHTML=build(byYear,byBU,accounts,claims,mv,
      {y:(r[0].rows||[]).length,u:(r[1].rows||[]).length,a:(r[2].rows||[]).length,c:(r[3].rows||[]).length,
       cols:(r[0].cols||[]).map(function(c){return c.fieldName;}).join(' | ')});
  }).catch(function(e){document.getElementById("app").innerHTML='<p class="err">Error: '+esc(e.message||e)+'</p>';});}

tableau.extensions.initializeAsync().then(function(){
  refresh();
  tableau.extensions.dashboardContent.dashboard.worksheets.forEach(function(ws){
    ws.addEventListener(tableau.TableauEventType.FilterChanged,refresh);
    ws.addEventListener(tableau.TableauEventType.MarkSelectionChanged,refresh);});
  var ps=tableau.extensions.dashboardContent.dashboard.getParametersAsync;
  if(ps)tableau.extensions.dashboardContent.dashboard.getParametersAsync().then(function(list){
    list.forEach(function(p){p.addEventListener(tableau.TableauEventType.ParameterChanged,refresh);});});
}).catch(function(e){document.getElementById("app").innerHTML='<p class="err">Failed to initialise: '+e+'</p><p class="muted">(BUILD v5 - this message is normal outside Tableau)</p>';});
</script></body></html>
